spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: guests
          uri: http://localhost:8081
          predicates:
            - Path=/api/guests,/api/guests/**

        - id: rooms
          uri: http://localhost:8082
          predicates:
            - Path=/api/rooms,/api/rooms/**

        - id: bookings
          uri: http://localhost:8083
          predicates:
            - Path=/api/bookings,/api/bookings/**

        - id: payments
          uri: http://localhost:8084
          predicates:
            - Path=/api/payments,/api/payments/**

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html